# 살색돼지 / 황금돼지 / 산타돼지 / 응가 풀자동 사냥
#
# === 검증된 흐름 (캡처 분석 기준) ===
# 1. NPC 발견 → walker 가 정확히 그 위로 이동 (max_dist=4)
# 2. 도착 시 motion=62 (웃음) 패킷 자동 발사
# 3. 서버 broadcast: "나 OO 아이템 얻었어요~!!" + expGain 50
# 4. NPC type 가 c → o 로 변환 (변신 상태 표시)
# 5. 드랍 아이템 (돼지코/책임의 열쇠/응가 등) 이 obj 패킷으로 등장
# 6. walker 자동 재타겟 → itemGet 으로 자동 픽업
#
# === 알려진 NPC ↔ 드랍 매핑 (캡처 검증) ===
#   살색돼지 → 돼지코
#   산타돼지 → 책임의 열쇠
#   황금돼지 → ??? (캡처에 잡힌 거 없음 — 추정: 황금돼지코)
#   응가/응가을/쵸코응가 등 → 응가 종류
#
# === 매크로 검출 위험 ===
# motion 자동발사 + 정확한 위치 이동 = 매크로처럼 보임. stealth=true 로
# 랜덤 지터 + 반응 지연 적용. 그래도 위험은 있음.

# === 캡처 검증된 표정짓기 가능 NPC ===
# 돼지 시리즈 (idx 3000~3002): 살색돼지, 황금돼지, 산타돼지
# 강아지 시리즈 (○○팝): 쵸코팝(2118), 차차팝(2120), 골드팝(2121), 오팝(2011)
# 차차 시리즈: 둥둥차차, 빨간멍든차차, 차차둥둥
# 드랍 아이템: 돼지코, 책임의 열쇠, 쵸코응가, 차차응가, 골드응가 등
# 매크로 검출 가능성 — 장기간 사용 시 위험 ⚠️
filter = "돼지,팝,차차,응가,열쇠"
types = "hi,i,c,o"   # em 제외 (상점만 잡힘). 'o' 는 변신상태 감지 (target 에선 자동 제외)
auto_walk = true
pickup = true                       # 드랍 아이템 자동 줍기
auto_smile = true                   # 도착 시 자동 표정 (풀자동의 핵심)
smile_motion = 62                   # 웃음 (캡처 검증)
# teleport = true                   # ⚠️ MacroDetector "Teleport:" 플래그 검출
                                    # 정식 useSkill 패킷 캡처되면 그걸로 대체 예정
stealth = true                      # 랜덤 지터/반응 지연
web = true
beep = true

# 빠른 walking — NPC speed=4 와 동등하게 (장애물 회피 + 이동 추격용)
step_size = 4
walk_interval = 0.10

# 정확히 동물 위에 올라가야 표정 효과 — max_dist 작게
max_dist = 4.0
max_target_dist = 200.0

# === 게임 메커니즘 (사용자 정보) ===
# 살색돼지 (조이맵 7) + 초코응가 (해피맵 6) = 매시 정각 13마리 spawn.
# 정각 후 튕겼다가 재접하면 모든 개돼지 소멸 → 재접속 절대 금지.
# 평소(정각 외) 는 idle — 트래픽 최소화 + 매크로 의심 줄임.

# 맵 순환 — 정각 burst 모드 (매시 정각에만 활성)
map_cycle = "00100,00101,00102,00103,00104,00105,00200,02100,02101,02102,02103,02104,02105"
hourly_burst = true
hourly_lead = 10.0    # 정각 10초 전에 깨어나서 첫 맵 진입 (서버 오차 보정)
map_cycle_secs = 25.0 # 맵당 25초 (13맵 × 25초 = 5분 30초 1바퀴 → spawn 직후 모두 캐치)

# 도달 못 한 동물은 20초 후 포기 (25초 cycle 안에 다음 맵으로 넘어가도록)
walk_timeout = 20.0
blacklist_secs = 25.0

# 표정 발사 후 같은 NPC 8초간 재시도 안 함 (try_smile 내부 처리)
# 다른 사람이 먼저 잡은 동물 (type=o) 은 자동으로 타겟 제외됨
